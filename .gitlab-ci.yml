image: registry.obvsg.at:443/container/docker/saxon/xspec:debian-slim

variables:
  GIT_SUBMODULE_STRATEGY: recursive
  GIT_SUBMODULE_FORCE_HTTPS: "true"

stages:
  - build
  - docs
  - deploy

compile:
  stage: build
  script:
    - mkdir dist
    - mkdir temp
    - mkdir -p test/xspec
    - saxon -xsl:xslt-bundler/xslt-builder.xsl -it:main configFile=../config.xml
    - bash temp/testrunner.sh
  artifacts:
    when: always
    name: package
    expire_in: 30 days
    paths:
      - dist/*
      - test/*
    reports:
      junit: test/xspec/*junit.xml

docs:
  stage: docs
  script:
    - mkdir docs
    - saxon-xslt -xsl:xslt-documentation-generator/xslt/documentation-generator.xsl -it:main lang=ger configFile=../../config.xml
  artifacts:
    - docs

deploy_development:
  stage: deploy
  environment:
    name: development
    url: http://share-test.obvsg.at/docs/xsltNormalization
  script:
    - echo "${DEPLOY_KEY}" > CIKey && chmod 0600 CIKey && echo "${DEPLOY_KEY_PUB}" > CIKey.pub
    - ls -l CIKey* ~/.ssh
    - rsync -r -p -i CIKey docs/* obvsoft@galileo:/work/obvsoft/evol/apps/Alma/xslt-normalization/docs
  only:
    - develompent
